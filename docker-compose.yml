services:
  phone-agent:
    build: .
    ports:
      - "7860:7860"
    env_file:
      - path: .env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      - ADB_SERVER_SOCKET=tcp:host.docker.internal:5037
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./screenshots:/app/screenshots
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
